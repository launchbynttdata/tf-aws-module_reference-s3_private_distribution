repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
        args:
          - --assume-in-merge
      - id: check-shebang-scripts-are-executable
      - id: check-yaml
        args:
          - --allow-multiple-documents
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args:
          - --fix=auto
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.0
    hooks:
      - id: terraform_fmt
      # terraform_validate requires `terraform init` which downloads private modules from
      # terraform.registry.launch.nttdata.com. In CI, this requires TF_TOKEN credentials
      # which are unavailable to pull_request workflows. Validation is still performed by
      # the dedicated "Check Terraform" workflow in pull-request-check-terraform.yml which
      # has proper auth configured. Skipping here prevents redundant failures in pre-commit.
      # - id: terraform_validate
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true
          - --args=--sort=false
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [ "--baseline", ".secrets.baseline" ]
        exclude: package.lock.json
